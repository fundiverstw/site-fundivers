title: FunDivers site — maintenance guide
description: Plain-language instructions for changing the FunDivers TW website.
theme: jekyll-theme-cayman
show_downloads: false

# The Cayman theme's footer links the owner's name at site.github.owner_url,
# which defaults to the GitHub organisation. Point it at the shop instead.
github:
  owner_url: https://www.fundiverstw.com
  owner_name: FunDivers TW

# These pages have no YAML front matter, so jekyll-optional-front-matter adds it
# for us. By default it ALSO copies the raw .md files into the published site, so
# /setting-up.md serves the markdown source next to /setting-up.html. Publish only
# the rendered pages.
optional_front_matter:
  remove_originals: true
